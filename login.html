<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome back to zanX | Login</title>
  <meta name="description" content="Login to access your account on zanX.">
  <meta name="author" content="AbdulAziz">
  <link rel="stylesheet" href="login-signup.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <div class="wrapper">
    <form onsubmit="event.preventDefault(); login();">
      <h2>Login</h2>

      <!-- ERROR MESSAGE -->
      <p id="msg" style="color:#ff6b6b; text-align:center; margin-bottom:10px;"></p>

      <div class="input-field">
        <input type="email" id="email" required>
        <label>Enter your email</label>
      </div>

      <div class="input-field">
        <input type="password" id="password" required>
        <label>Enter your password</label>
      </div>

      <button type="submit">Log In</button>

      <div class="divider">
        <span>or</span>
      </div>

      <button type="button" class="google-btn" onclick="googleAuth()">
        <i class="fa-brands fa-google"></i> Continue with Google
      </button>

      <div class="register">
        <p>Don't have an account?
          <a href="signup.html">Register</a>
        </p>
      </div>
    </form>
  </div>

  <!-- Firebase Login Logic -->
  <script type="module" src="app.js"></script>

</body>

</html>
